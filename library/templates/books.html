<!DOCTYPE html>
<html>
<head>
    <title>Books</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-4">

    <h2 class="text-center mb-4">📚 Available Books</h2>

    <!-- 🔍 SEARCH (OUTSIDE LOOP) -->
    <div class="card p-3 mb-4 shadow">
        <h4>🔍 Search Book</h4>

        <form action="/search" method="POST" class="row g-2">
            <div class="col-md-10">
                <input type="text" name="id" class="form-control" placeholder="Enter Book ID or Name" required>
            </div>
            <div class="col-md-2">
                <button class="btn btn-primary w-100">Search</button>
            </div>
        </form>
    </div>

    <!-- 📚 BOOKS LIST -->
    <div class="row">

        {% for book in books %}
        <div class="col-md-4 mt-3">
            <div class="card shadow p-3">

                <h5>{{ book[1] }}</h5>
                <p><b>Author:</b> {{ book[2] }}</p>

                {% if book[4] == 0 %}
                    <p class="text-danger"><b>Out of Stock</b></p>
                {% else %}
                    <p><b>Available:</b> {{ book[4] }}</p>
                {% endif %}

                <!-- 📥 BORROW FORM -->
                <form action="/borrow" method="POST">
                    <input type="hidden" name="b_id" value="{{ book[0] }}">
                    
                    <input type="date" name="date" required class="form-control mb-2">

                    <button class="btn btn-primary w-100"
                        {% if book[4] == 0 %} disabled {% endif %}>
                        Borrow
                    </button>
                </form>

            </div>
        </div>
        {% endfor %}

    </div>

    <div class="text-center">
        <a href="/" class="btn btn-secondary mt-4">⬅ Back</a>
    </div>

</div>

</body>
</html>

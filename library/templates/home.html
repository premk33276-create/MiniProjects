<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5 text-center">
    <h2>Welcome {{ session['user'] }} 👋</h2>

    <div class="row mt-4">

        <div class="col-md-4">
            <div class="card p-3 shadow">
                <h4>📚 Books</h4>
                <a href="/books.html" class="btn btn-primary mt-2">Go</a>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-3 shadow">
                <h4>📖 My Books</h4>
                <a href="/my_books" class="btn btn-success mt-2">View</a>
            </div>
        </div>

        {% if session['role'] == 'admin' %}
        <div class="col-md-4">
            <div class="card p-3 shadow">
                <h4>⚙️ Admin</h4>
                <a href="/admin" class="btn btn-dark mt-2">Open</a>
            </div>
        </div>
        {% endif %}

    </div>

    <a href="/logout" class="btn btn-danger mt-4">Logout</a>
</div>

</body>
</html>
